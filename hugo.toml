baseURL = 'https://www.bolt-the-bird.com/'
locale = 'en-us'
title = 'Bolt the Bird'

[module]
  [[module.imports]]
    path = "github.com/jordinebot/hugo-manaforge"

[params]
  accentColor = "#FB1105"
  brandWordmark = false
  defaultTheme = "light"

  [params.search]
    enabled = true            # search index is generated by `npm run build` (hugo + pagefind)

  [params.toc]
    minHeadings = 3

  [params.footer]
    recentPostsCount = 4
    tagCount = 12
    tagline = "Brews, bolts, and bird-themed nonsense from the Modern format."

  [[params.social]]
    name = "GitHub"
    url  = "https://github.com/jordinebot"
    icon = "github"
  [[params.social]]
    name = "RSS"
    url  = "/index.xml"
    icon = "rss"

[taxonomies]
  tag = "tags"

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 30
