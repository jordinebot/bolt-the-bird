baseURL = 'https://www.bolt-the-bird.com/'
defaultContentLanguage = "en"
title = "Bolt the bird!"

[module]
  [[module.imports]]
    path = "github.com/jordinebot/hugo-leyline"
  [[module.imports]]
    path = "github.com/jordinebot/hugo-mtg-shortcodes"

# Settings shared across all languages.
[params]
  accentColor = "#FB1105"

[taxonomies]
  tag = "tags"

# Footer icon links — shared across languages.
[[menus.footer]]
  name = "GitHub"
  url = "https://github.com/jordinebot"
  weight = 10
  [menus.footer.params]
    icon = "github"

[[menus.footer]]
  name = "RSS"
  url = "/index.xml"
  weight = 20
  [menus.footer.params]
    icon = "rss"

# ---------------------------------------------------------------------------
# Languages
#
# Posts translate via the file-suffix convention:
#   content/posts/foo.md      → English (default)
#   content/posts/foo.ca.md   → Catalan translation
# ---------------------------------------------------------------------------

[languages]

  [languages.en]
    label = "English"
    locale = "en-us"
    weight = 1

    [languages.en.params]
      description = "Bolts, birds, and other MTG-themed nonsense."
      [languages.en.params.footer]
        tagline = "Bolts, birds, and other MTG-themed nonsense."

    [[languages.en.menus.main]]
      name = "Posts"
      url  = "/posts/"
      weight = 10
    [[languages.en.menus.main]]
      name = "Tags"
      url  = "/tags/"
      weight = 20

  [languages.ca]
    label = "Català"
    locale = "ca-es"
    weight = 2

    [languages.ca.params]
      description = "Llamps, ocells i altres ximpleries de temàtica MTG."
      [languages.ca.params.footer]
        tagline = "Llamps, ocells i altres ximpleries de temàtica MTG."

    [[languages.ca.menus.main]]
      name = "Entrades"
      url  = "/ca/posts/"
      weight = 10
    [[languages.ca.menus.main]]
      name = "Etiquetes"
      url  = "/ca/tags/"
      weight = 20
