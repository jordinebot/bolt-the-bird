baseURL = 'https://www.bolt-the-bird.com/'
defaultContentLanguage = "en"
title = "Bolt the bird!"

[module]
  [[module.imports]]
    path = "github.com/jordinebot/hugo-leyline"
  [[module.imports]]
    path = "github.com/jordinebot/hugo-mtg-shortcodes"

# Settings shared across all languages.
[params]
  accentColor = "#4f46e5"
  googleTagID = "G-Q2VCWFH77S"

[taxonomies]
  tag = "tags"

# Footer links live PER LANGUAGE (see [[languages.<lang>.menus.footer]]).
# With [languages] configured, top-level [[menus.footer]] blocks don't
# attach to any language and silently fail to render.

# ---------------------------------------------------------------------------
# Languages
#
# Posts translate via the file-suffix convention:
#   content/posts/foo.md      → English (default)
#   content/posts/foo.ca.md   → Catalan translation
# ---------------------------------------------------------------------------

[languages]

  [languages.en]
    label = "English"
    locale = "en-us"
    weight = 1

    [languages.en.params]
      description = "Bolts, birds, and other nonsense."
      [languages.en.params.footer]
        tagline = "Bolts, birds, and other MTG-themed nonsense."

    [[languages.en.menus.main]]
      name = "Posts"
      url  = "/posts/"
      weight = 10
    [[languages.en.menus.main]]
      name = "Tags"
      url  = "/tags/"
      weight = 20
    [[languages.en.menus.main]]
      name = "Arena"
      url  = "/arena/"
      weight = 30
    [[languages.en.menus.main]]
      name = "About"
      url  = "/about/"
      weight = 40

    [[languages.en.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/bolt-the-bird"
      weight = 10
      [languages.en.menus.footer.params]
        icon = "github"
    [[languages.en.menus.footer]]
      name = "RSS"
      url  = "/index.xml"
      weight = 20
      [languages.en.menus.footer.params]
        icon = "rss"

  [languages.ca]
    label = "Català"
    locale = "ca-es"
    weight = 2

    [languages.ca.params]
      description = "Llamps, ocells i altres ximpleries."
      [languages.ca.params.footer]
        tagline = "Llamps, ocells i altres ximpleries sobre MTG."

    [[languages.ca.menus.main]]
      name = "Entrades"
      url  = "/ca/posts/"
      weight = 10
    [[languages.ca.menus.main]]
      name = "Etiquetes"
      url  = "/ca/tags/"
      weight = 20
    [[languages.ca.menus.main]]
      name = "Arena"
      url  = "/ca/arena/"
      weight = 30
    [[languages.ca.menus.main]]
      name = "Quant a"
      url  = "/ca/about/"
      weight = 40

    [[languages.ca.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/bolt-the-bird"
      weight = 10
      [languages.ca.menus.footer.params]
        icon = "github"
    [[languages.ca.menus.footer]]
      name = "RSS"
      url  = "/ca/index.xml"
      weight = 20
      [languages.ca.menus.footer.params]
        icon = "rss"
