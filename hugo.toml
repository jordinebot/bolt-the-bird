baseURL = 'https://www.bolt-the-bird.com/'
locale = 'en-us'
title = 'Bolt the Bird'

[module]
  [[module.imports]]
    path = "github.com/jordinebot/hugo-leyline"
  [[module.imports]]
    path = "github.com/jordinebot/hugo-mtg-shortcodes"

[params]
  description = "Brews, bolts, and bird-themed nonsense from the Modern format."
  accentColor = "#FB1105"

  [params.footer]
    tagline = "Brews, bolts, and bird-themed nonsense from the Modern format."

[taxonomies]
  tag = "tags"

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menus.footer]]
  name = "GitHub"
  url = "https://github.com/jordinebot"
  weight = 10
  [menus.footer.params]
    icon = "github"

[[menus.footer]]
  name = "RSS"
  url = "/index.xml"
  weight = 20
  [menus.footer.params]
    icon = "rss"
