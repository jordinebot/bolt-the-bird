baseURL = 'https://www.bolt-the-bird.com/'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "Bolt the Bird!"

[module]
  [[module.imports]]
    path = "github.com/jordinebot/hugo-leyline"
  [[module.imports]]
    path = "github.com/jordinebot/hugo-mtg-shortcodes"

# Settings shared across all languages.
[params]
  accentColor = "#4f46e5"
  googleTagID = "G-Q2VCWFH77S"

[taxonomies]
  tag = "tags"

# Footer links live PER LANGUAGE (see [[languages.<lang>.menus.footer]]).
# With [languages] configured, top-level [[menus.footer]] blocks don't
# attach to any language and silently fail to render.

# ---------------------------------------------------------------------------
# Languages
#
# Posts translate via the file-suffix convention:
#   content/posts/foo/index.md    → English (default)
#   content/posts/foo/index.ca.md → Catalan translation
# ---------------------------------------------------------------------------

[languages]

  [languages.en]
    label = "English"
    locale = "en-us"
    weight = 1

    [languages.en.params]
      description = "Magic: The Gathering draft logs, Arena runs, deck notes, and tournament reports."
      [languages.en.params.footer]
        # Optional legal copy rendered by Leyline in the global footer.
        [languages.en.params.footer.fanContentDisclaimer]
          text = "Bolt the Bird! is unofficial Fan Content permitted under the Fan Content Policy. Not approved/endorsed by Wizards. Portions of the materials used are property of Wizards of the Coast. © Wizards of the Coast LLC."
          policyText = "Fan Content Policy"
          policyURL = "https://company.wizards.com/en/legal/fancontentpolicy"

    [[languages.en.menus.main]]
      name = "Posts"
      url  = "/posts/"
      weight = 10
    [[languages.en.menus.main]]
      name = "Tags"
      url  = "/tags/"
      weight = 20
    [[languages.en.menus.main]]
      name = "Arena"
      url  = "/arena/"
      weight = 30
    [[languages.en.menus.main]]
      name = "About"
      url  = "/about/"
      weight = 40

    [[languages.en.menus.footer]]
      name = "Email"
      url  = "mailto:always@bolt-the-bird.com"
      weight = 10
      [languages.en.menus.footer.params]
        icon = "mail"
    [[languages.en.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/bolt-the-bird"
      weight = 20
      [languages.en.menus.footer.params]
        icon = "github"
    [[languages.en.menus.footer]]
      name = "RSS"
      url  = "/index.xml"
      weight = 30
      [languages.en.menus.footer.params]
        icon = "rss"

  [languages.ca]
    label = "Català"
    locale = "ca-es"
    weight = 2

    [languages.ca.params]
      description = "Drafts de Magic: The Gathering, partides a Arena, notes de baralles i cròniques de tornejos."
      [languages.ca.params.footer]
        # Còpia legal opcional renderitzada per Leyline al footer global.
        [languages.ca.params.footer.fanContentDisclaimer]
          text = "Bolt the Bird és contingut no oficial creat per fans i permès segons la Fan Content Policy. No està aprovat ni avalat per Wizards. Part dels materials utilitzats són propietat de Wizards of the Coast. © Wizards of the Coast LLC."
          policyText = "Fan Content Policy"
          policyURL = "https://company.wizards.com/en/legal/fancontentpolicy"

    [[languages.ca.menus.main]]
      name = "Entrades"
      url  = "/ca/posts/"
      weight = 10
    [[languages.ca.menus.main]]
      name = "Etiquetes"
      url  = "/ca/tags/"
      weight = 20
    [[languages.ca.menus.main]]
      name = "Arena"
      url  = "/ca/arena/"
      weight = 30
    [[languages.ca.menus.main]]
      name = "Quant a"
      url  = "/ca/about/"
      weight = 40

    [[languages.ca.menus.footer]]
      name = "Email"
      url  = "mailto:always@bolt-the-bird.com"
      weight = 10
      [languages.ca.menus.footer.params]
        icon = "mail"
    [[languages.ca.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/bolt-the-bird"
      weight = 20
      [languages.ca.menus.footer.params]
        icon = "github"
    [[languages.ca.menus.footer]]
      name = "RSS"
      url  = "/ca/index.xml"
      weight = 30
      [languages.ca.menus.footer.params]
        icon = "rss"
