media:
  input: static/images
  output: /images

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: content/posts
    filename: "{primary}.md"
    view:
      fields: [title, date, draft]
      primary: title
      sort: date
      order: desc

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: description
        label: Description
        type: text

      - name: tags
        label: Tags
        type: string
        list: true

      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: content
    subfolders: false
    exclude:
      - posts

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: body
        label: Content
        type: rich-text